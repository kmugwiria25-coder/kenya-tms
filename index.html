<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=kenya-tms-complete.html">
<title>MajengoSmart Pro – Kenya Tenant Management System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }
  .card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 50px 60px;
    text-align: center;
    backdrop-filter: blur(10px);
    max-width: 480px;
    width: 90%;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
  }
  .logo { font-size: 64px; margin-bottom: 16px; }
  h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
  .subtitle { color: rgba(255,255,255,0.65); font-size: 1rem; margin-bottom: 36px; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #4fc3f7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 28px; }
  .btn {
    display: inline-block;
    background: linear-gradient(135deg, #4fc3f7, #0288d1);
    color: white;
    text-decoration: none;
    padding: 14px 36px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 1rem;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 6px 20px rgba(79,195,247,0.35);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(79,195,247,0.45); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏠</div>
  <h1>MajengoSmart Pro</h1>
  <p class="subtitle">Kenya Tenant Management System</p>
  <div class="spinner"></div>
  <p class="loading-text">Loading application…</p>
  <a href="kenya-tms-complete.html" class="btn">Open Application →</a>
</div>
<script>
  // Redirect automatically — fallback to portal-link if main file not found
  fetch('kenya-tms-complete.html', { method: 'HEAD' })
    .then(r => { if (r.ok) window.location.replace('kenya-tms-complete.html'); else window.location.replace('portal-link.html'); })
    .catch(() => window.location.replace('kenya-tms-complete.html'));
</script>
</body>
</html>
